# ── Shared config fragments ──────────────────────────────────────────────────
x-langfuse-env: &langfuse-env
  DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
  SALT: ${LANGFUSE_SALT}
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/${CLICKHOUSE_DB}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ${REDIS_PASSWORD}
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse-media
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
  LANGFUSE_LOG_LEVEL: debug

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  otel_data:
  minio_data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 (with pgvector) ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis 6 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:6-alpine
    container_name: redis
    restart: unless-stopped
    env_file: .env
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory-policy noeviction
    ports:
      - "6380:6379"   # host 6380 → container 6379 (avoids conflict with local Redis)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── ClickHouse (Langfuse-compatible) ──────────────────────────────────────
  # Langfuse requires ClickHouse 23.x – 24.x with the HTTP interface on 8123
  # and native interface on 9000.
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: clickhouse
    restart: unless-stopped
    env_file: .env
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP interface  (Langfuse uses this)
      - "9000:9000"   # Native interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/single-node.xml:/etc/clickhouse-server/config.d/single-node.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user=${CLICKHOUSE_USER}", "--password=${CLICKHOUSE_PASSWORD}", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - backend

  # ── MinIO (S3-compatible blob store for Langfuse v3) ────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # S3 API  (host 9002 avoids clash with ClickHouse native port)
      - "9001:9001"   # MinIO console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  # ── MinIO bucket init ─────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    restart: on-failure
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/langfuse-events;
        mc mb --ignore-existing local/langfuse-media;
      "
    networks:
      - backend

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  # Receives OTLP (gRPC :4317, HTTP :4318), exports to stdout + ClickHouse.
  # Swap the exporter block for a real backend (Jaeger, Tempo, etc.) as needed.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: otel-collector
    restart: unless-stopped
    env_file: .env
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:8888:8888"   # Collector metrics (Prometheus scrape endpoint)
      - "127.0.0.1:13133:13133" # Health check extension
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - backend

  # ── Langfuse ──────────────────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    container_name: langfuse
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *langfuse-env
      NEXTAUTH_URL: ${LANGFUSE_URL}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - backend

  langfuse-worker:
    image: langfuse/langfuse-worker:latest
    container_name: langfuse-worker
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *langfuse-env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      langfuse:
        condition: service_started
    networks:
      - backend
