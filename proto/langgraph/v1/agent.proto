syntax = "proto3";

package langgraph.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/mike00028/golang-backend/services/api/internal/langgraphv1";

// ─── Legacy Messages (kept for backward compatibility) ───────────────────────

message AgentRequest {
  string session_id                    = 1;
  string message                       = 2;
  google.protobuf.Struct options       = 3;
  string model                         = 4;
}

message ToolCall {
  string id         = 1;
  string name       = 2;
  string args_json  = 3;
}

message ToolResult {
  string tool_call_id = 1;
  string content      = 2;
}

message EventMetadata {
  int64 timestamp_ms  = 1;
  string node_name    = 2;
  string thinking     = 3;
}

message ResponseMetadata {
  string session_id        = 1;
  string model             = 2;
  int32 tool_calls_count   = 3;
  int64 execution_time_ms  = 4;
}

message AgentEvent {
  string event_type      = 1;
  EventMetadata metadata = 2;

  oneof content {
    string text              = 3;
    string error             = 4;
    ToolCall tool_call       = 5;
    ToolResult tool_result   = 6;
    string message           = 7;
  }
}

message AgentResponse {
  ResponseMetadata metadata = 1;

  oneof result {
    string text  = 2;
    string error = 3;
  }
}

// ─── DAG Orchestration Messages ──────────────────────────────────────────────
// Note: PlanDAG and EvaluateDAG are handled natively in Go (Ollama structured
// output). Python is only responsible for ExecuteTask (tool execution).

// ExecuteTask: Go tells Python to run one tool and stream back progress events.
message TaskRequest {
  string session_id = 1;
  string task_id    = 2;  // Unique node ID (e.g. "t1")
  string tool_name  = 3;
  string args_json  = 4;
  string context    = 5;  // Dependency outputs injected by Go (text form)
  string agent_id   = 6;
}

// Streamed event for a single task execution.
message TaskEvent {
  string type     = 1;  // "started" | "progress" | "text" | "done" | "error"
  string payload  = 2;  // JSON payload (progress %, partial text, final result)
  int32  pct      = 3;  // Progress 0–100 (for "progress" events)
  string error    = 4;  // Error description (for "error" events)
}

// ─── Service ─────────────────────────────────────────────────────────────────

service AgentService {
  // Legacy: kept for backward compatibility
  rpc RunAgent    (AgentRequest) returns (AgentResponse);
  rpc StreamAgent (AgentRequest) returns (stream AgentEvent);

  // Tool execution: Go sends task, Python streams back progress events
  rpc ExecuteTask (TaskRequest)  returns (stream TaskEvent);
}
